        // Обработчик выполнения кода (имитация)
        function runCodeHandler() {
            const editor = document.getElementById('codeEditor');
            const output = document.getElementById('outputConsole');
            
            if (!editor) return;
            
            const code = editor.value;
            
            if (code.includes('turtle') || code.includes('Turtle')) {
                output.innerHTML = '🐢 Обнаружен код с Turtle! Для выполнения скопируйте код в среду Python на вашем компьютере.';
            } else if (code.includes('print')) {
                const matches = code.match(/print\(['"](.*)['"]\)/g);
                if (matches) {
                    let result = '';
                    matches.forEach(match => {
                        const content = match.replace(/print\(['"]/, '').replace(/['"]\)/, '');
                        result += content + '\n';
                    });
                    output.innerHTML = result || 'Код выполнен (имитация)';
                } else {
                    output.innerHTML = 'Код содержит print (имитация выполнения)';
